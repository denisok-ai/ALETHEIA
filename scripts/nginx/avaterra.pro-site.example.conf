# Пример vhost для avaterra.pro (синхронизировать с продом вручную).
#
# Важно:
# - Путь статики Next — `/_next/static/` (подчёркивание). Шаблон `\.next/static/` НЕ совпадает
#   и весь трафик уходит в location / → срабатывает limit_req → 503 при HTTP/2.
# - `limit_req` только на location / ; для `/_next/static/` и `/_next/image` — отдельные блоки
#   без limit_req (одна страница = десятки параллельных запросов на одном соединении).

limit_req_zone $binary_remote_addr zone=aletheia:10m rate=25r/s;

server {
    listen 443 ssl http2;
    server_name avaterra.pro www.avaterra.pro;
    # ssl_certificate ... (Certbot)
    # SCORM ZIP и медиа: без этого nginx отдаёт 413 (по умолчанию часто 1m)
    client_max_body_size 512m;

    location ~* ^/_next/static/ {
        proxy_cache mycache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* ^/_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=aletheia burst=80 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
