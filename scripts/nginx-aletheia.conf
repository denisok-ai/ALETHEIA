# Минимальный reverse proxy без кеша HTML — подходит для Next.js App Router (динамика, RSC).
# SSL и server_name добавьте в свой реальный vhost.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Не кешировать HTML/RSC у nginx (иначе после деплоя видна старая оболочка и ломается гидратация).
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}

# --- НЕ ДЕЛАЙТЕ ТАК для всего location / ---
# proxy_cache mycache;
# proxy_cache_valid 200 30d;
# Это кеширует любой ответ 200 от Node, включая страницы /, /portal/*, и на 30 дней отдаёт устаревший HTML.

