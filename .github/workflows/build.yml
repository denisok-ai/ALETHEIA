name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_URL: https://avaterra.pro

      - name: Pack .next for VPS deploy
        if: >
          vars.VPS_DEPLOY == 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        run: tar czf next.tar.gz .next

      - name: Upload next bundle for VPS
        if: >
          vars.VPS_DEPLOY == 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/upload-artifact@v4
        with:
          name: next-bundle
          path: next.tar.gz
          retention-days: 2

  deploy-vps:
    needs: build
    runs-on: ubuntu-latest
    if: >
      vars.VPS_DEPLOY == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    env:
      VPS_HOST: ${{ vars.VPS_HOST || '95.181.224.70' }}
      VPS_USER: ${{ vars.VPS_USER || 'root' }}
      VPS_PATH: ${{ vars.VPS_PATH || '/opt/ALETHEIA' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download next bundle
        uses: actions/download-artifact@v4
        with:
          name: next-bundle

      - name: Extract .next
        run: tar xzf next.tar.gz

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Stop app on VPS
        run: |
          ssh -o BatchMode=yes "${VPS_USER}@${VPS_HOST}" "DEPLOY_ROOT='$VPS_PATH' bash -se" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_ROOT"
          if systemctl is-active --quiet aletheia.service 2>/dev/null; then
            sudo systemctl stop aletheia.service
          elif command -v pm2 >/dev/null 2>&1 && pm2 describe aletheia &>/dev/null; then
            pm2 stop aletheia
          fi
          REMOTE

      - name: Rsync build and sources
        run: |
          RSYNC='ssh -o BatchMode=yes'
          DEST="${VPS_USER}@${VPS_HOST}:${VPS_PATH}"
          rsync -avz --delete -e "$RSYNC" ./.next/ "$DEST/.next/"
          rsync -avz --delete -e "$RSYNC" ./public/ "$DEST/public/"
          rsync -avz --delete -e "$RSYNC" ./prisma/ "$DEST/prisma/"
          rsync -avz -e "$RSYNC" \
            ./package.json ./package-lock.json ./next.config.mjs ./middleware.ts \
            "$DEST/"

      - name: npm ci, prisma, nginx cache, start
        run: |
          ssh -o BatchMode=yes "${VPS_USER}@${VPS_HOST}" "DEPLOY_ROOT='$VPS_PATH' bash -se" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_ROOT"
          export NODE_ENV=production
          rm -rf node_modules
          npm ci --omit=dev
          npx prisma generate
          if [[ -d /var/cache/nginx ]] && [[ -n "$(ls -A /var/cache/nginx 2>/dev/null)" ]]; then
            sudo sh -c 'rm -rf /var/cache/nginx/*' || true
          fi
          if command -v nginx >/dev/null 2>&1; then
            sudo nginx -t 2>/dev/null && sudo nginx -s reload || true
          fi
          if systemctl list-unit-files 2>/dev/null | grep -q '^aletheia.service'; then
            sudo systemctl start aletheia.service
            sudo systemctl is-active aletheia.service
          elif command -v pm2 >/dev/null 2>&1; then
            pm2 restart aletheia 2>/dev/null || pm2 start npm --name aletheia --cwd "$DEPLOY_ROOT" -- start
            pm2 save || true
          fi
          REMOTE
